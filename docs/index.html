<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏠Inicio - Rexi</title>
  <script src="js/analytics.js"></script>
  <link rel="icon" type="image/png" href="images/logo-circular.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="chatbot/chatbot.css">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>
  <img src="images/logo-circular.png" alt="Logo" class="logo">
  <h1>Rexi666</h1>
  <p>Amplia experiencia en la creación, desarrollo y administración de servidores de Minecraft</p>

  <div class="buttons">
    <div>
      <a class="button" href="portfolio.html">🛠️ Minecraft Dev</a>
    </div>
    <div>
      <a class="button" href="contact.html">📬 Contacto</a>
    </div>
    <div>
      <a class="button" href="socials.html">🎥 Redes Sociales</a>
    </div>
  </div>

  <!-- CHATBOT -->
  <div id="chatbox">
    <div id="chatHeader">
      <span>💬 Asistente de Rexi</span>
      <button id="closeChatBtn" title="Cerrar chat">×</button>
    </div>
    <div id="messages"></div>
    <div id="inputArea">
      <input type="text" id="input" placeholder="Escribe tu pregunta..." />
      <button id="sendBtn">Enviar</button>
    </div>
  </div>
  <button id="chatToggleBtn" title="Abrir chat">💬</button>

  <script type="module" src="https://esm.run/@google/generative-ai"></script>
  <script type="module" src="chatbot/chatbot.js"></script>
