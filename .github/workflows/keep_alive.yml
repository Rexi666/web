name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * 1,3,5' # Lunes y Miércoles y Viernes a las 00:00 UTC
  workflow_dispatch: # Botón para ejecutar manualmente

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Insertar señal de vida
        run: |
          curl -i -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{"last_ping": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'
